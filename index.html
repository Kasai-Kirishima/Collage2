<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Лабораторна робота №4</title>

<!-- favicon -->
<link rel="icon" href="icon.ico">

<style>
body {
    background-color: #A0DE59;
    font-family: Arial;
    text-align: center;
}

/* картинки */
img {
    width: 250px;
    margin: 10px;
    border: 3px solid #59DE79;
    box-shadow: 5px 5px 15px #68DE59;
}

/* блоки */
.section {
    background: #D8DE59;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

/* svg стиль */
svg {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Лабораторна робота №4</h1>

<!-- ЗМІНЕНА КАРТИНКА -->
<div class="section">
<h2>Змінене зображення (metromal)</h2>
<img src="metromal.jpg" alt="edited image">
</div>

<!-- МЕМ -->
<div class="section">
<h2>Мем (memfutr)</h2>
<img src="memfutr.jpg" alt="meme">
</div>

<!-- SVG ВЕКТОР -->
<div class="section">
<h2>SVG Вектор</h2>

<svg width="200" height="200">
    <rect x="20" y="20" width="160" height="160" fill="#59DEA7"/>
    <circle cx="100" cy="100" r="60" fill="#AADEA3"/>
</svg>

</div>

</body>
</html>
